<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Table Builder</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1a1a2e; --ink-mid: #4a4a6a; --ink-light: #8888aa;
    --surface: #f7f6f2; --white: #ffffff;
    --accent: #2d6a4f; --accent-mid: #52b788;
    --gold: #b5835a; --border: #e0ddd6;
    --selected-bg: #eaf6ee; --radius: 10px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--ink); min-height: 100vh; }
  header { background: var(--ink); color: white; padding: 1.5rem 2.5rem; display: flex; align-items: baseline; gap: 14px; border-bottom: 3px solid var(--accent-mid); }
  header h1 { font-family: 'DM Serif Display', serif; font-size: 1.7rem; font-weight: 400; letter-spacing: -0.02em; }
  header span { font-size: 0.85rem; color: rgba(255,255,255,0.45); font-weight: 300; }
  .workspace { display: grid; grid-template-columns: 290px 1fr; min-height: calc(100vh - 72px); }
  .sidebar { background: var(--white); border-right: 1px solid var(--border); padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
  .sidebar-title { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-light); padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .select-all-btn { font-size: 0.7rem; font-weight: 500; color: var(--accent); cursor: pointer; background: none; border: none; font-family: inherit; padding: 0; text-transform: none; letter-spacing: 0; }
  .select-all-btn:hover { text-decoration: underline; }
  .search-box { position: relative; }
  .search-box input { width: 100%; padding: 8px 12px 8px 34px; border: 1px solid var(--border); border-radius: var(--radius); font-family: inherit; font-size: 0.85rem; background: var(--surface); color: var(--ink); outline: none; transition: border-color 0.2s; }
  .search-box input:focus { border-color: var(--accent-mid); }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--ink-light); font-size: 14px; pointer-events: none; }
  .teacher-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 3px; max-height: calc(100vh - 280px); }
  .teacher-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; cursor: pointer; transition: background 0.15s; border: 1px solid transparent; user-select: none; }
  .teacher-item:hover { background: var(--surface); }
  .teacher-item.selected { background: var(--selected-bg); border-color: var(--accent-mid); }
  .teacher-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--ink); color: white; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; flex-shrink: 0; transition: background 0.2s; }
  .teacher-item.selected .teacher-avatar { background: var(--accent); }
  .teacher-name { font-size: 0.85rem; flex: 1; line-height: 1.3; }
  .check-icon { width: 17px; height: 17px; border-radius: 50%; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 9px; color: transparent; transition: all 0.2s; flex-shrink: 0; }
  .teacher-item.selected .check-icon { background: var(--accent); border-color: var(--accent); color: white; }
  .add-section { display: flex; gap: 6px; padding-top: 0.5rem; border-top: 1px solid var(--border); }
  .add-section input { flex: 1; padding: 7px 10px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 0.82rem; outline: none; background: var(--surface); color: var(--ink); }
  .add-section input:focus { border-color: var(--accent-mid); }
  .btn-add { padding: 7px 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-family: inherit; font-size: 0.82rem; font-weight: 500; cursor: pointer; white-space: nowrap; }
  .btn-add:hover { background: #245a41; }
  .sel-count { font-size: 0.78rem; color: var(--ink-light); }
  .main { padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem; overflow: auto; }
  .top-bar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .top-label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-light); }
  .btn { padding: 7px 14px; border-radius: 8px; font-family: inherit; font-size: 0.82rem; font-weight: 500; cursor: pointer; transition: all 0.2s; border: 1px solid var(--border); background: var(--white); color: var(--ink); }
  .btn:hover { background: var(--surface); }
  .btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
  .btn.primary:hover { background: #245a41; }
  .btn.gold { background: var(--gold); color: white; border-color: var(--gold); }
  .btn.gold:hover { background: #9a6e4a; }
  .btn.danger { background: #c0392b; color: white; border-color: #c0392b; }
  .btn.danger:hover { background: #a93226; }
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--ink-light); padding: 4rem; text-align: center; }
  .empty-state .icon { font-size: 3rem; opacity: 0.3; }
  .empty-state p { font-size: 0.9rem; max-width: 280px; line-height: 1.6; }
  .table-wrapper { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: auto; box-shadow: 0 2px 12px rgba(26,26,46,0.08); }
  table { width: 100%; border-collapse: collapse; min-width: 500px; }
  thead tr { background: var(--ink); color: white; }
  th { padding: 0; text-align: left; min-width: 130px; border-right: 1px solid rgba(255,255,255,0.1); }
  th:last-child { border-right: none; }
  th.name-col { min-width: 200px; }
  th .th-inner { display: flex; align-items: center; gap: 6px; padding: 12px 14px; }
  .th-editable { flex: 1; outline: none; min-width: 60px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: white; background: transparent; border: none; font-family: inherit; cursor: text; padding: 0; }
  .th-editable:focus { background: rgba(255,255,255,0.1); border-radius: 4px; padding: 2px 4px; margin: -2px -4px; }
  .th-editable::placeholder { color: rgba(255,255,255,0.35); }
  .rm-col { background: none; border: none; color: rgba(255,255,255,0.4); cursor: pointer; font-size: 13px; padding: 0; line-height: 1; transition: color 0.15s; flex-shrink: 0; }
  .rm-col:hover { color: #e74c3c; }
  tbody tr { border-top: 1px solid var(--border); }
  tbody tr:hover { background: #fafaf8; }
  td { padding: 0; border-right: 1px solid var(--border); vertical-align: top; }
  td:last-child { border-right: none; }
  td input, td textarea { width: 100%; padding: 10px 14px; border: none; outline: none; font-family: inherit; font-size: 0.86rem; color: var(--ink); background: transparent; resize: none; min-height: 42px; line-height: 1.4; transition: background 0.15s; }
  td input:focus, td textarea:focus { background: #f0faf4; }
  td.name-cell { background: var(--surface); }
  td.name-cell input { font-weight: 500; cursor: default; background: transparent; }
  .rm-row { background: none; border: none; color: var(--ink-light); cursor: pointer; font-size: 15px; padding: 10px 8px; transition: color 0.15s; display: block; width: 100%; text-align: center; }
  .rm-row:hover { color: #e74c3c; }
  td.act-col, th.act-col { min-width: 34px; width: 34px; border-right: none; }
  .toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--ink); color: white; padding: 12px 20px; border-radius: var(--radius); font-size: 0.85rem; font-weight: 500; box-shadow: 0 4px 20px rgba(0,0,0,0.2); transform: translateY(80px); opacity: 0; transition: all 0.3s cubic-bezier(.34,1.56,.64,1); z-index: 999; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .modal-backdrop { position: fixed; inset: 0; background: rgba(26,26,46,0.5); z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-backdrop.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--white); border-radius: 14px; padding: 2rem; width: 90%; max-width: 520px; transform: scale(0.95); transition: transform 0.2s; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  .modal-backdrop.open .modal { transform: scale(1); }
  .modal h2 { font-family: 'DM Serif Display', serif; font-size: 1.3rem; font-weight: 400; margin-bottom: 0.5rem; }
  .modal-opts { display: flex; flex-direction: column; gap: 10px; margin-top: 1.25rem; }
  .mopt { display: flex; align-items: flex-start; gap: 14px; padding: 14px 16px; border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: all 0.15s; background: var(--white); text-align: left; font-family: inherit; width: 100%; }
  .mopt:hover { background: var(--surface); border-color: var(--accent-mid); }
  .mopt .oi { font-size: 1.4rem; flex-shrink: 0; margin-top: 2px; }
  .mopt .ot { font-size: 0.88rem; font-weight: 600; color: var(--ink); }
  .mopt .od { font-size: 0.78rem; color: var(--ink-light); margin-top: 2px; line-height: 1.4; }
  .mclose { display: block; margin-top: 1rem; text-align: center; font-size: 0.8rem; color: var(--ink-light); cursor: pointer; background: none; border: none; font-family: inherit; width: 100%; }
  .mclose:hover { color: var(--ink); }
  @media (max-width: 700px) { .workspace { grid-template-columns: 1fr; } .sidebar { max-height: 45vh; } .main { padding: 1rem; } header { padding: 1rem 1.25rem; } }
</style>
</head>
<body>

<header>
  <h1>Teacher Table Builder</h1>
  <span>Select · fill · copy &amp; email</span>
</header>

<div class="workspace">
  <div class="sidebar">
    <div class="sidebar-title">
      <span>Teachers <span id="totalCt" style="font-weight:400;opacity:0.6"></span></span>
      <button class="select-all-btn" onclick="toggleSelectAll()">Select all</button>
    </div>
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search…" oninput="filterTeachers()">
    </div>
    <div class="teacher-list" id="teacherList"></div>
    <div class="sel-count" id="selCount">0 of 42 selected</div>
    <div class="add-section">
      <input type="text" id="newName" placeholder="Add teacher…" onkeydown="if(event.key==='Enter') addTeacher()">
      <button class="btn-add" onclick="addTeacher()">+ Add</button>
    </div>
  </div>

  <div class="main">
    <div class="top-bar">
      <span class="top-label">Columns:</span>
      <button class="btn primary" onclick="addColumn()">+ Add column</button>
      <button class="btn gold" onclick="openModal()">📋 Copy &amp; Email</button>
      <button class="btn danger" onclick="clearAll()">✕ Clear all</button>
    </div>
    <div id="tableArea"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-backdrop" id="mb" onclick="bgClose(event)">
  <div class="modal">
    <h2>Copy &amp; send via email</h2>
    <p style="font-size:0.83rem;color:var(--ink-mid)">Choose your format:</p>
    <div class="modal-opts">
      <button class="mopt" onclick="copyHTML()">
        <span class="oi">📄</span>
        <div><div class="ot">Copy as rich text</div><div class="od">Pastes as a formatted table in Gmail, Outlook &amp; Apple Mail</div></div>
      </button>
      <button class="mopt" onclick="copyText()">
        <span class="oi">📝</span>
        <div><div class="ot">Copy as plain text</div><div class="od">Tab-separated — works in any app</div></div>
      </button>
      <button class="mopt" onclick="doMailto()">
        <span class="oi">✉️</span>
        <div><div class="ot">Open in Mail app</div><div class="od">Launches your default email client with the table pre-filled</div></div>
      </button>
    </div>
    <button class="mclose" onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
let teachers = ["Al Ghafry, Sami","Anaya, David","Bustillos, Ray","Castañeda, Rodolfo","Cawthon, Ronald","Clark, Daniel","Claudio, Iris","Cuellar, Rosa","David Nigro","Dorsey, Dwayne","Dorsey, Glenda","Glass, Jeannette","Gotcher, Barbara","Green, Jason","Hale, Ruth","Handy, Renika","Hernandez, Isidoro","Johnson, Michael","Joy, Mijo","Ketola, Martin","Knight, Sha'Terri (Mr. Jones)","Lane, Debra","Lopez, Jonathan","McDonald, Latoyia","Mendoza, Eduardo","Milligan, William","Mohamed, Ibrahim","Moon, Zachary","Morton, Antonio","Palmer, Becky","Parker, DeLaina","Ray, Richard","Richard Shepherd","Sanchez, Moises","Sanso, Deborah","Sherin, Khayam","Suarez, Diego","Tarango, Giovanni","Torres, Harold","Vu, Trinh","Weatherd, Dani","Williams, Bridget"];

let selected = new Set();
let columns = ["Column 1","Column 2","Column 3"];
let tdata = {};

function init() {
  document.getElementById('totalCt').textContent = '('+teachers.length+')';
  renderList(); renderTable();
}

function getInitials(n) {
  const c = n.replace(/\(.*?\)/g,'').trim();
  return c.replace(/,/,' ').split(/\s+/).filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();
}

function filterTeachers() { renderList(document.getElementById('searchInput').value.toLowerCase()); }

function renderList(f='') {
  const el = document.getElementById('teacherList');
  el.innerHTML = '';
  teachers.filter(t=>t.toLowerCase().includes(f)).forEach(name => {
    const sel = selected.has(name);
    const d = document.createElement('div');
    d.className = 'teacher-item'+(sel?' selected':'');
    d.innerHTML = `<div class="teacher-avatar">${getInitials(name)}</div><span class="teacher-name">${eh(name)}</span><div class="check-icon">✓</div>`;
    d.onclick = () => toggle(name);
    el.appendChild(d);
  });
  document.getElementById('selCount').textContent = selected.size+' of '+teachers.length+' selected';
}

function toggle(name) {
  if (selected.has(name)) { selected.delete(name); columns.forEach((_,i)=>delete tdata[name+'||'+i]); }
  else selected.add(name);
  renderList(document.getElementById('searchInput').value.toLowerCase());
  renderTable();
}

function toggleSelectAll() {
  const f = document.getElementById('searchInput').value.toLowerCase();
  const vis = teachers.filter(t=>t.toLowerCase().includes(f));
  const allSel = vis.every(t=>selected.has(t));
  if (allSel) vis.forEach(t=>{selected.delete(t);columns.forEach((_,i)=>delete tdata[t+'||'+i]);});
  else vis.forEach(t=>selected.add(t));
  renderList(f); renderTable();
}

function addTeacher() {
  const inp = document.getElementById('newName');
  const name = inp.value.trim();
  if (!name) return;
  if (teachers.includes(name)) { toast('⚠️ Already in list'); return; }
  teachers.push(name);
  teachers.sort((a,b)=>a.localeCompare(b));
  inp.value='';
  renderList(document.getElementById('searchInput').value.toLowerCase());
  toast('✓ '+name+' added');
}

function addColumn() { columns.push('Column '+(columns.length+1)); renderTable(); }

function removeCol(i) {
  if (columns.length<=1) { toast('⚠️ Need at least one column'); return; }
  selected.forEach(name=>{
    delete tdata[name+'||'+i];
    for(let j=i+1;j<columns.length;j++){
      const v=tdata[name+'||'+j];
      if(v!==undefined) tdata[name+'||'+(j-1)]=v; else delete tdata[name+'||'+(j-1)];
      delete tdata[name+'||'+j];
    }
  });
  columns.splice(i,1); renderTable();
}

function renderTable() {
  const area = document.getElementById('tableArea');
  if (!selected.size) { area.innerHTML=`<div class="empty-state"><div class="icon">📋</div><p>Select teachers from the list on the left to build your table.</p></div>`; return; }
  const rows=[...selected].sort((a,b)=>a.localeCompare(b));
  let h=`<div class="table-wrapper"><table><thead><tr><th class="name-col"><div class="th-inner"><span class="th-editable" style="cursor:default;opacity:0.5;font-size:0.72rem">Teacher</span></div></th>`;
  columns.forEach((col,i)=>{
    h+=`<th><div class="th-inner"><input class="th-editable" type="text" value="${ea(col)}" placeholder="Column title" oninput="columns[${i}]=this.value" onchange="columns[${i}]=this.value"><button class="rm-col" onclick="removeCol(${i})" title="Remove">✕</button></div></th>`;
  });
  h+=`<th class="act-col"></th></tr></thead><tbody>`;
  rows.forEach(name=>{
    h+=`<tr><td class="name-cell"><input type="text" value="${ea(name)}" readonly></td>`;
    columns.forEach((_,i)=>{
      const v=tdata[name+'||'+i]||'';
      h+=`<td><textarea rows="1" placeholder="…" oninput="sc(this,'${je(name)}',${i})">${eh(v)}</textarea></td>`;
    });
    h+=`<td class="act-col"><button class="rm-row" onclick="removeRow('${je(name)}')" title="Remove">✕</button></td></tr>`;
  });
  h+=`</tbody></table></div>`;
  area.innerHTML=h;
  area.querySelectorAll('textarea').forEach(ar);
}

function sc(el,name,i) { tdata[name+'||'+i]=el.value; ar(el); }
function ar(el) { el.style.height='auto'; el.style.height=el.scrollHeight+'px'; }
function removeRow(name) { selected.delete(name); columns.forEach((_,i)=>delete tdata[name+'||'+i]); renderList(document.getElementById('searchInput').value.toLowerCase()); renderTable(); }
function clearAll() { if(!confirm('Clear all?')) return; selected.clear(); tdata={}; renderList(document.getElementById('searchInput').value.toLowerCase()); renderTable(); toast('✓ Cleared'); }

function eh(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ea(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function je(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

function getHTML() {
  const rows=[...selected].sort((a,b)=>a.localeCompare(b));
  let h=`<table border="1" cellpadding="8" cellspacing="0" style="border-collapse:collapse;font-family:Arial,sans-serif;font-size:13px;width:100%"><thead><tr style="background:#1a1a2e;color:white;"><th style="padding:10px 14px;text-align:left;min-width:180px;">Teacher</th>`;
  columns.forEach(c=>{h+=`<th style="padding:10px 14px;text-align:left;min-width:120px;">${eh(c)}</th>`;});
  h+=`</tr></thead><tbody>`;
  rows.forEach((name,ri)=>{
    h+=`<tr style="background:${ri%2===0?'#fff':'#f7f6f2'};"><td style="padding:9px 14px;font-weight:600;">${eh(name)}</td>`;
    columns.forEach((_,i)=>{h+=`<td style="padding:9px 14px;">${eh(tdata[name+'||'+i]||'')}</td>`;});
    h+=`</tr>`;
  });
  return h+`</tbody></table>`;
}

function getPlain() {
  const rows=[...selected].sort((a,b)=>a.localeCompare(b));
  return [['Teacher',...columns].join('\t'),...rows.map(n=>[n,...columns.map((_,i)=>tdata[n+'||'+i]||'')].join('\t'))].join('\n');
}

function openModal() { if(!selected.size){toast('⚠️ No teachers selected');return;} document.getElementById('mb').classList.add('open'); }
function bgClose(e) { if(e.target===document.getElementById('mb')) closeModal(); }
function closeModal() { document.getElementById('mb').classList.remove('open'); }

function copyHTML() {
  try {
    const item=new ClipboardItem({'text/html':new Blob([getHTML()],{type:'text/html'}),'text/plain':new Blob([getPlain()],{type:'text/plain'})});
    navigator.clipboard.write([item]).then(()=>{toast('✓ Rich table copied — paste into Gmail or Outlook');closeModal();}).catch(()=>fallback());
  } catch(e){fallback();}
}
function fallback(){navigator.clipboard.writeText(getPlain()).then(()=>{toast('✓ Copied as plain text');closeModal();});}
function copyText(){navigator.clipboard.writeText(getPlain()).then(()=>{toast('✓ Plain text copied');closeModal();});}
function doMailto(){window.location.href=`mailto:?subject=${encodeURIComponent('Teacher Table')}&body=${encodeURIComponent(getPlain())}`;closeModal();}

let tt;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2800);}

init();
</script>
</body>
</html>
